name: Verify real GitHub OIDC token

on: [push, workflow_dispatch]

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm ci
      - run: npx ts-node scripts/verify-real-oidc.ts
